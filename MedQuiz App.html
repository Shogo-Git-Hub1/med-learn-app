<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #e8edf5; font-family: 'Noto Sans JP', sans-serif; }
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
#root { display: flex; flex-direction: column; align-items: center; gap: 32px; padding: 40px 20px; }

/* Tweaks panel */
#tweaks-panel {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: white; border-radius: 16px; padding: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15); width: 260px;
  font-family: 'Noto Sans JP', sans-serif; display: none;
}
#tweaks-panel.visible { display: block; }
#tweaks-panel h3 { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 16px; letter-spacing: 0.5px; text-transform: uppercase; }
.tweak-group { margin-bottom: 14px; }
.tweak-label { font-size: 12px; color: #666; margin-bottom: 6px; font-weight: 500; }
.tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
.tweak-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid #ddd; background: white; font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all .15s; }
.tweak-btn.active { border-color: #2563EB; background: #EFF6FF; color: #2563EB; font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Tweaks Panel -->
<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-group">
    <div class="tweak-label">カラーテーマ</div>
    <div class="tweak-options">
      <button class="tweak-btn active" onclick="setTheme('blue')" id="theme-blue">ブルー</button>
      <button class="tweak-btn" onclick="setTheme('teal')" id="theme-teal">ティール</button>
      <button class="tweak-btn" onclick="setTheme('violet')" id="theme-violet">バイオレット</button>
    </div>
  </div>
  <div class="tweak-group">
    <div class="tweak-label">レイアウトバリエーション</div>
    <div class="tweak-options">
      <button class="tweak-btn active" onclick="setVariant('A')" id="var-A">A — クリーン</button>
      <button class="tweak-btn" onclick="setVariant('B')" id="var-B">B — カード</button>
      <button class="tweak-btn" onclick="setVariant('C')" id="var-C">C — ダーク</button>
    </div>
  </div>
  <div class="tweak-group">
    <div class="tweak-label">問題タイプ（プレビュー）</div>
    <div class="tweak-options">
      <button class="tweak-btn active" onclick="setQType('mcq')" id="qt-mcq">4択</button>
      <button class="tweak-btn" onclick="setQType('tf')" id="qt-tf">○×</button>
      <button class="tweak-btn" onclick="setQType('fill')" id="qt-fill">穴埋め</button>
      <button class="tweak-btn" onclick="setQType('image')" id="qt-image">画像</button>
    </div>
  </div>
</div>

    case 'edit-square': return <svg {...common}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>;
    case 'star': return <svg {...common}><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9 12 2"/></svg>;
    case 'gem': return <svg {...common}><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>;

    case 'party': return <svg {...common}><path d="M5.8 11.3 2 22l10.7-3.8"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="M22 2 12 12"/><path d="M16.5 7.5 19 5"/><path d="m11.5 11.5 1 1"/><path d="m13.5 13.5 1 1"/></svg>;
    case 'thumbs-up': return <svg {...common}><path d="M7 10v12"/><path d="M15 5.9 14 10h5.5a2 2 0 0 1 2 2.3l-1.4 8.5a2 2 0 0 1-2 1.7H7a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3h2.7a2 2 0 0 0 1.8-1.1l2.5-5a1.5 1.5 0 0 1 2 .5z"/></svg>;
    case 'flex': return <svg {...common}><path d="M17.5 21H7a2 2 0 0 1-2-2v-3l3-7c.4-1 1.4-1.5 2.4-1.2l5 1.5"/><circle cx="18" cy="5" r="3"/><path d="M15 8 9 14"/></svg>;
    case 'medal': return <svg {...common}><path d="M7.2 8.5 4 2h6l3 5"/><path d="M16.8 8.5 20 2h-6l-3 5"/><circle cx="12" cy="15" r="6"/><circle cx="12" cy="15" r="2"/></svg>;
    case 'cap': return <svg {...common}><path d="M22 10 12 5 2 10l10 5 10-5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
    case 'pencil': return <svg {...common}><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18z"/><path d="m2 2 7.6 7.6"/><circle cx="11" cy="11" r="2"/></svg>;

}






const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "blue",

// ─── Global state (outside React for tweaks bridge) ─────────
let g_theme = TWEAK_DEFAULTS.theme;
let g_variant = TWEAK_DEFAULTS.variant;
let g_qtype = TWEAK_DEFAULTS.qtype;
let g_setters = {};

window.setTheme = (t) => {
  g_theme = t;
  document.querySelectorAll('[id^="theme-"]').forEach((b) => b.classList.remove('active'));
  document.getElementById('theme-' + t)?.classList.add('active');
  g_setters.theme?.(t);
  postEdit({ theme: t });
};
window.setVariant = (v) => {
  g_variant = v;
  document.querySelectorAll('[id^="var-"]').forEach((b) => b.classList.remove('active'));
  document.getElementById('var-' + v)?.classList.add('active');
  g_setters.variant?.(v);
  postEdit({ variant: v });
};
window.setQType = (q) => {
  g_qtype = q;
  document.querySelectorAll('[id^="qt-"]').forEach((b) => b.classList.remove('active'));
  document.getElementById('qt-' + q)?.classList.add('active');
  g_setters.qtype?.(q);
  postEdit({ qtype: q });
};
function postEdit(edits) {
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
}

// ─── Shared UI primitives ────────────────────────────────────
function XPBar({ xp, maxXp, theme }) {
  const pct = Math.min(100, xp / maxXp * 100);
  return (
    <div style={{ background: theme.mid, borderRadius: 99, height: 8, overflow: 'hidden' }}>
      <div style={{
        width: pct + '%', height: '100%',
        background: `linear-gradient(90deg, ${theme.primary}, ${theme.accent})`,
        borderRadius: 99, transition: 'width .6s ease'
      }} />
    </div>);

}

function Badge({ label, color, bg }) {
  return (
    <span style={{
      fontSize: 11, fontWeight: 700, color, background: bg,
      padding: '3px 8px', borderRadius: 20, letterSpacing: 0.3
    }}>{label}</span>);

}

// Shared bottom tab bar — always visible except on quiz screen
function TabBar({ current, onNavigate, isDark, theme }) {
  const items = [
    { icon: 'home', label: 'ホーム', screen: 'home' },
    { icon: 'book', label: 'コース', screen: 'courses' },
    { icon: 'refresh', label: '復習', screen: 'review' },
    { icon: 'user', label: 'マイページ', screen: 'profile' }
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 24, left: 16, right: 16,
      borderRadius: 999, padding: '8px',
      display: 'flex', alignItems: 'stretch',
      background: isDark ? 'rgba(30, 41, 59, 0.55)' : 'rgba(255, 255, 255, 0.75)',
      backdropFilter: 'blur(20px) saturate(180%)',
      WebkitBackdropFilter: 'blur(20px) saturate(180%)',
      border: isDark ? '1px solid rgba(255,255,255,0.12)' : '1px solid rgba(255,255,255,0.6)',
      boxShadow: isDark ?
        '0 8px 28px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08)' :
        '0 8px 28px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.8)',
      zIndex: 10
    }}>
      {items.map(({ icon, label, screen: tgt }) => {
        const active = tgt === current;
        return (
          <div key={label} onClick={() => !active && onNavigate(tgt)} style={{
            flex: 1,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',

            background: active ? 'rgba(255,255,255,0.95)' : 'transparent',
            boxShadow: active ? '0 2px 8px rgba(0,0,0,0.08)' : 'none',
            transition: 'all .25s ease', cursor: active ? 'default' : 'pointer'
          }}>
            <Icon name={icon} size={20} color={active ? theme.primary : (isDark ? 'rgba(255,255,255,0.75)' : '#475569')} strokeWidth={active ? 2.4 : 2} />
            <span style={{
              fontSize: 10, fontWeight: active ? 700 : 500,
              color: active ? theme.primary : isDark ? 'rgba(255,255,255,0.75)' : '#475569',
              whiteSpace: 'nowrap', letterSpacing: 0.2
            }}>{label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ─── Screen A: HOME ──────────────────────────────────────────
function HomeScreen({ theme, variant, onNavigate }) {

// ─── Screen B: QUIZ ──────────────────────────────────────────
function QuizScreen({ theme, variant, qtype, onNavigate }) {
  const [selected, setSelected] = React.useState(null);
  const [fillInput, setFillInput] = React.useState('');
  const [revealed, setRevealed] = React.useState(false);

  const isDark = variant === 'C';
  const bg = isDark ? '#0F172A' : '#F8FAFF';
  const cardBg = isDark ? '#1E293B' : 'white';
  const textPrimary = isDark ? '#F1F5F9' : '#111827';
  const textSec = isDark ? '#94A3B8' : '#6B7280';
  const borderCol = isDark ? '#334155' : '#E5E7EB';

  const data = QUIZ_DATA[qtype];
  const questionNum = 4;const totalQ = 10;
  const progressPct = (questionNum - 1) / totalQ * 100;

  const handleSelect = (i) => {
    if (revealed) return;
    setSelected(i);
    setRevealed(true);
  };
  const handleFill = () => {
    if (!fillInput.trim()) return;
    setRevealed(true);
  };
  const handleNext = () => {
    setSelected(null);
    setFillInput('');
    setRevealed(false);
    onNavigate('result');
  };

  const isCorrect = (i) => {
    if (qtype === 'fill') return fillInput.trim() === data.blank;
    return i === data.answer;
  };

  return (
    <div style={{ background: bg, minHeight: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{ padding: '64px 16px 16px', background: isDark ? '#1E293B' : 'white', borderBottom: `1px solid ${borderCol}` }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <button onClick={() => onNavigate('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: textSec, fontSize: 14, fontFamily: 'Noto Sans JP' }}>← 終了</button>
          <Badge label={data.subject} color={theme.dark} bg={theme.mid} />
          <span style={{ fontSize: 13, fontWeight: 600, color: textSec }}>{questionNum}/{totalQ}</span>
        </div>
        <div style={{ background: isDark ? '#334155' : theme.mid, borderRadius: 99, height: 6, overflow: 'hidden' }}>
          <div style={{ width: progressPct + '%', height: '100%', background: theme.primary, borderRadius: 99, transition: 'width .4s' }} />
        </div>
      </div>

      <div style={{ flex: 1, padding: '20px 16px', overflowY: 'auto' }}>
        {/* Question card */}
        <div style={{
          background: cardBg, borderRadius: 20, padding: '20px',
          border: `1px solid ${borderCol}`, marginBottom: 16,
          boxShadow: isDark ? 'none' : '0 2px 12px rgba(0,0,0,0.06)'
        }}>
          {/* Question type badge */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
            <Badge
              label={qtype === 'mcq' ? '4択問題' : qtype === 'tf' ? '正誤問題' : qtype === 'fill' ? '穴埋め問題' : '画像問題'}
              color={theme.primary} bg={theme.light} />
            
            <Badge label="難易度：普通" color="#92400E" bg="#FEF3C7" />
          </div>

          {/* Image question placeholder */}
          {qtype === 'image' &&
          <div style={{
            background: isDark ? '#334155' : '#F1F5F9',
            borderRadius: 12, height: 140, marginBottom: 14,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            border: `1.5px dashed ${borderCol}`
          }}>
              <Icon name="lung" size={32} color={isDark ? '#94A3B8' : '#64748B'} />
              <span style={{ fontSize: 11, color: textSec, fontFamily: 'monospace', letterSpacing: 0.3, marginTop: 6 }}>腹部臓器 解剖図</span>
            </div>
          }

          <p style={{ fontSize: 16, fontWeight: 700, color: textPrimary, lineHeight: 1.7 }}>
            {data.question}
          </p>
        </div>

        {/* Answer area */}
        {qtype === 'fill' ?
        <div style={{ marginBottom: 16 }}>
            <input
            value={fillInput}
            onChange={(e) => setFillInput(e.target.value)}
            disabled={revealed}
            placeholder="答えを入力..."
            style={{
              width: '100%', padding: '14px 16px', borderRadius: 14,
              border: revealed ?
              `2px solid ${isCorrect() ? '#10B981' : '#EF4444'}` :
              `1.5px solid ${borderCol}`,
              background: cardBg, fontSize: 15, fontFamily: 'Noto Sans JP',
              color: textPrimary, outline: 'none'
            }} />
          
            {!revealed &&
          <button onClick={handleFill} style={{
            width: '100%', marginTop: 10, background: theme.primary, color: 'white',
            border: 'none', borderRadius: 12, padding: '14px',
            fontSize: 15, fontWeight: 700, fontFamily: 'Noto Sans JP', cursor: 'pointer'
          }}>答え合わせ</button>
          }
            {revealed &&
          <div style={{ marginTop: 10, padding: '12px 14px', background: isCorrect() ? '#ECFDF5' : '#FEF2F2', borderRadius: 12, border: `1px solid ${isCorrect() ? '#A7F3D0' : '#FECACA'}` }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: isCorrect() ? '#065F46' : '#991B1B', display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                  {isCorrect() ? <><Icon name="check-circle" size={14} color="#065F46" />正解！</> : <><Icon name="x-circle" size={14} color="#991B1B" />正解：{data.blank}</>}
                </span>
              </div>
          }
          </div> :

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 16 }}>
            {data.options.map((opt, i) => {
            const isSel = selected === i;
            const correct = i === data.answer;
            let optBg = cardBg,optBorder = borderCol,optText = textPrimary;
            if (revealed && correct) {optBg = '#ECFDF5';optBorder = '#10B981';optText = '#065F46';} else
            if (revealed && isSel && !correct) {optBg = '#FEF2F2';optBorder = '#EF4444';optText = '#991B1B';} else
            if (isSel) {optBg = theme.light;optBorder = theme.primary;optText = theme.dark;}
            return (
              <button key={i} onClick={() => handleSelect(i)} style={{
                background: optBg, border: `2px solid ${optBorder}`,
                borderRadius: 14, padding: '14px 16px', textAlign: 'left',
                cursor: revealed ? 'default' : 'pointer',
                fontFamily: 'Noto Sans JP', transition: 'all .15s',
                display: 'flex', alignItems: 'center', gap: 12
              }}>
                  <div style={{
                  width: 28, height: 28, borderRadius: '50%',
                  background: revealed && correct ? '#10B981' : revealed && isSel ? '#EF4444' : isSel ? theme.primary : isDark ? '#334155' : '#F1F5F9',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0, fontSize: 13, fontWeight: 700,
                  color: isSel || revealed && correct ? 'white' : textSec
                }}>
                    {revealed && correct ? '✓' : revealed && isSel && !correct ? '✗' : 'ABCD'[i]}
                  </div>
                  <span style={{ fontSize: 14, fontWeight: 500, color: optText, lineHeight: 1.4 }}>{opt}</span>
                </button>);

          })}
          </div>
        }

        {/* Explanation */}
        {revealed &&
        <div style={{
          background: isDark ? '#1E293B' : theme.light,
          border: `1px solid ${theme.mid}`,
          borderRadius: 16, padding: '14px 16px', marginBottom: 16
        }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: theme.primary, marginBottom: 6, display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="lightbulb" size={14} color={theme.primary} />解説</div>
            <p style={{ fontSize: 13, color: textSec, lineHeight: 1.7 }}>{data.explanation}</p>
          </div>
        }
      </div>

      {/* Next button */}
      {revealed &&
      <div style={{ padding: '12px 16px 28px', background: isDark ? '#1E293B' : 'white', borderTop: `1px solid ${borderCol}` }}>
          <button onClick={handleNext} style={{
          width: '100%', background: theme.primary, color: 'white',
          border: 'none', borderRadius: 14, padding: '15px',
          fontSize: 16, fontWeight: 700, fontFamily: 'Noto Sans JP', cursor: 'pointer',
          boxShadow: `0 4px 14px ${theme.primary}55`
        }}>次の問題へ →</button>
        </div>
      }
    </div>);

}

  // GitHub風カレンダーデータ（過去12週、7日×12列）

      const seed = (w * 7 + d) * 9301 + 49297;
      const rand = (seed % 233280) / 233280;
      let level = 0;
      if (rand > 0.3) level = 1;
      if (rand > 0.55) level = 2;
      if (rand > 0.75) level = 3;
      if (rand > 0.9) level = 4;

      week.push(level);

          <div style={{ display: 'flex', gap: 8 }}>
            <button style={{
              background: 'rgba(255,255,255,0.15)', border: 'none', borderRadius: 10,

        background: bg,
        position: 'sticky', top: 0, zIndex: 5,
        display: 'flex', alignItems: 'center', gap: 10
      }}>
        <button onClick={goBack} style={{
          background: cardBg, border: `1px solid ${borderCol}`,
          width: 36, height: 36, borderRadius: 12,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: 'pointer', color: textPrimary
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div style={{ flex: 1, fontSize: 12, fontWeight: 600, color: textSec }}>解剖学 / {unit.name}</div>
      </div>

      {/* Hero banner */}
      <div style={{ padding: '4px 16px 0' }}>
        <div style={{
          background: `linear-gradient(135deg, ${unit.accent} 0%, ${unit.accentDeep} 100%)`,
          borderRadius: 22, padding: '20px 18px',
          color: 'white', position: 'relative', overflow: 'hidden',
          boxShadow: `0 12px 28px ${unit.accent}40`
        }}>
          {/* decorative rings */}
          <svg viewBox="0 0 200 200" style={{
            position: 'absolute', top: -30, right: -40, width: 180, height: 180, opacity: 0.18
          }}>
            <circle cx="100" cy="100" r="80" fill="none" stroke="white" strokeWidth="1.5" />
            <circle cx="100" cy="100" r="60" fill="none" stroke="white" strokeWidth="1.5" />
            <circle cx="100" cy="100" r="40" fill="none" stroke="white" strokeWidth="1.5" />
          </svg>
          <div style={{ position: 'relative' }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, opacity: 0.75, marginBottom: 6 }}>ANATOMY ・ UNIT</div>
            <h2 style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.5, lineHeight: 1.15, marginBottom: 6 }}>{unit.name}</h2>
            <p style={{ fontSize: 12, opacity: 0.85, lineHeight: 1.5, marginBottom: 16, maxWidth: '85%' }}>{unit.subtitle}</p>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
              <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 0.4 }}>{done}/{total} レッスン</span>
              <span style={{ flex: 1 }} />
              <span style={{ fontSize: 11, fontWeight: 700, opacity: 0.9 }}>{pct}%</span>
            </div>
            <div style={{ background: 'rgba(255,255,255,0.22)', borderRadius: 99, height: 6, overflow: 'hidden' }}>
              <div style={{ width: `${pct}%`, height: '100%', background: 'white', borderRadius: 99 }} />
            </div>
          </div>
        </div>
      </div>

      {/* The journey path */}
      <div style={{ padding: '28px 0 8px', position: 'relative' }}>
        {regular.map((lesson, i) => {
          const offset = offsets[i % offsets.length];
          const nextOffset = i < regular.length - 1 ? offsets[(i + 1) % offsets.length] : 0;
          const isDone = lesson.state === 'done';
          const isCurrent = lesson.state === 'current';
          const isLocked = lesson.state === 'locked';

          const nodeColor = isDone ? unit.accent : isCurrent ? unit.accent : (isDark ? '#334155' : '#E2E8F0');
          const iconColor = isDone ? 'white' : isCurrent ? 'white' : (isDark ? '#64748B' : '#94A3B8');

          return (
            <div key={lesson.id} style={{
              position: 'relative',
              display: 'flex', flexDirection: 'column', alignItems: 'center',
              marginBottom: i < regular.length - 1 ? 6 : 20
            }}>
              {/* Connecting dotted line to next */}
              {i < regular.length - 1 && (
                <svg width="200" height="60" viewBox="0 0 200 60" style={{
                  position: 'absolute', top: 80, left: '50%',
                  transform: `translateX(calc(-50% + ${(offset + nextOffset) / 2}px))`,
                  pointerEvents: 'none', zIndex: 0
                }}>
                  <path
                    d={`M ${100 - offset/4} 0 Q ${100 + (nextOffset - offset)/2} 30 ${100 + (nextOffset - offset)/4} 60`}
                    fill="none"
                    stroke={isDark ? '#334155' : '#CBD5E1'}
                    strokeWidth="2.5"
                    strokeDasharray="2 6"
                    strokeLinecap="round"
                  />
                </svg>
              )}

              {/* Node */}
              <div style={{ position: 'relative', transform: `translateX(${offset}px)`, zIndex: 1 }}>
                {/* START label above current */}
                {isCurrent && (
                  <div style={{
                    position: 'absolute', top: -28, left: '50%', transform: 'translateX(-50%)',
                    background: unit.accentDeep, color: 'white',
                    padding: '4px 12px', borderRadius: 20,
                    fontSize: 10, fontWeight: 800, letterSpacing: 1.2,
                    boxShadow: `0 4px 12px ${unit.accentDeep}66`,
                    whiteSpace: 'nowrap'
                  }}>
                    今ココ
                    <svg width="10" height="6" viewBox="0 0 10 6" style={{ position: 'absolute', bottom: -5, left: '50%', transform: 'translateX(-50%)' }}>
                      <path d="M0 0 L5 6 L10 0 Z" fill={unit.accentDeep} />
                    </svg>
                  </div>
                )}

                <button
                  onClick={() => !isLocked && onNavigate('quiz')}
                  disabled={isLocked}
                  style={{
                    width: 84, height: 84,
                    borderRadius: isDone ? '50%' : '26px',
                    background: nodeColor,
                    border: 'none',
                    cursor: isLocked ? 'not-allowed' : 'pointer',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    padding: 0,
                    boxShadow: isLocked
                      ? 'inset 0 -3px 0 rgba(0,0,0,0.12)'
                      : isDone
                        ? `0 6px 0 ${unit.accentDeep}, 0 10px 20px ${unit.accent}40`
                        : `0 6px 0 ${unit.accentDeep}, 0 12px 24px ${unit.accent}55`,
                    transition: 'transform .15s',
                    position: 'relative'
                  }}
                >
                  <div style={{ width: 34, height: 34, color: iconColor }}>
                    {isDone
                      ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                      : isLocked
                        ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        : LESSON_ICONS[lesson.type]('currentColor')
                    }
                  </div>
                  {/* Progress ring for current */}
                  {isCurrent && (
                    <svg viewBox="0 0 100 100" style={{ position: 'absolute', inset: -6, width: 'calc(100% + 12px)', height: 'calc(100% + 12px)', transform: 'rotate(-90deg)', pointerEvents: 'none' }}>
                      <circle cx="50" cy="50" r="47" fill="none" stroke={isDark ? '#1E293B' : '#E2E8F0'} strokeWidth="3" />
                      <circle cx="50" cy="50" r="47" fill="none" stroke={unit.accentDeep} strokeWidth="3"
                        strokeDasharray={`${2 * Math.PI * 47 * 0.35} ${2 * Math.PI * 47}`}
                        strokeLinecap="round" />
                    </svg>
                  )}
                </button>

                {/* Title pill */}
                <div style={{
                  position: 'absolute', top: 92, left: '50%', transform: 'translateX(-50%)',
                  background: cardBg,
                  border: `1px solid ${borderCol}`,
                  borderRadius: 14,
                  padding: '8px 14px',
                  minWidth: 150, maxWidth: 200,
                  textAlign: 'center',
                  boxShadow: isDark ? 'none' : '0 2px 6px rgba(15,23,42,0.06)',
                  opacity: isLocked ? 0.6 : 1
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4, marginBottom: 2 }}>
                    <span style={{
                      fontSize: 8, fontWeight: 800, letterSpacing: 1,
                      color: isLocked ? textSec : unit.accent,
                      textTransform: 'uppercase'
                    }}>
                      レッスン {i + 1}
                    </span>
                    <span style={{ fontSize: 8, color: textSec }}>・</span>
                    <span style={{ fontSize: 8, color: textSec, fontWeight: 600 }}>{lesson.q}問</span>
                  </div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: textPrimary, lineHeight: 1.3 }}>{lesson.title}</div>
                  <div style={{ fontSize: 10, color: textSec, marginTop: 2 }}>{lesson.sub}</div>
                </div>
              </div>

              {/* Spacer for the title pill */}
              <div style={{ height: 160 }} />
            </div>
          );
        })}

        {/* Boss / Unit assessment */}
        {boss && (
          <div style={{ padding: '0 16px', marginTop: 4 }}>
            <div style={{
              background: cardBg,
              border: `1.5px solid ${borderCol}`,
              borderRadius: 18,
              padding: '16px',
              display: 'flex', alignItems: 'center', gap: 14,
              opacity: boss.state === 'locked' ? 0.75 : 1,
              boxShadow: isDark ? 'none' : '0 2px 8px rgba(15,23,42,0.05)'
            }}>
              <div style={{
                width: 54, height: 54, borderRadius: 14,
                background: boss.state === 'locked' ? (isDark ? '#334155' : '#F1F5F9') : unit.accentSoft,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0, color: boss.state === 'locked' ? textSec : unit.accent
              }}>
                <div style={{ width: 28, height: 28 }}>
                  {LESSON_ICONS.boss('currentColor')}
                </div>
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2 }}>
                  <span style={{ fontSize: 9, fontWeight: 800, color: unit.accent, letterSpacing: 1 }}>FINAL ・ ユニット総合テスト</span>
                </div>
                <div style={{ fontSize: 14, fontWeight: 700, color: textPrimary, marginBottom: 3 }}>{boss.title}</div>
                <div style={{ fontSize: 10, color: textSec, lineHeight: 1.5 }}>
                  {boss.state === 'locked'
                    ? `${unit.name}の全レッスン（${total}/${total}）を完了すると挑戦できます`
                    : `${boss.q}問 ・ 合格で習得度 100% に`}
                </div>
              </div>
              {boss.state === 'locked' ? (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={textSec} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              ) : (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={textSec} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Screen C: RESULT ────────────────────────────────────────
function ResultScreen({ theme, variant, onNavigate }) {
  const isDark = variant === 'C';
  const bg = isDark ? '#0F172A' : '#F8FAFF';
  const cardBg = isDark ? '#1E293B' : 'white';
  const textPrimary = isDark ? '#F1F5F9' : '#111827';
  const textSec = isDark ? '#94A3B8' : '#6B7280';
  const borderCol = isDark ? '#334155' : '#E5E7EB';

  const score = 8;const total = 10;const xpEarned = 120;
  const pct = score / total * 100;
  const breakdown = [
  { label: '正解', count: 8, color: '#10B981' },
  { label: '不正解', count: 2, color: '#EF4444' }];


  return (
    <div style={{ background: bg, minHeight: '100%', paddingBottom: 100 }}>
      {/* Hero result */}
      <div style={{
        background: variant === 'C' ?
        'linear-gradient(135deg, #1E293B 0%, #0F172A 100%)' :
        `linear-gradient(135deg, ${theme.primary} 0%, ${theme.dark} 100%)`,
        padding: '68px 20px 36px', textAlign: 'center',
        borderRadius: '0 0 32px 32px', position: 'relative', overflow: 'hidden'
      }}>
        <div style={{ position: 'absolute', top: -20, right: -20, width: 180, height: 180, borderRadius: '50%', background: 'rgba(255,255,255,0.05)' }} />
        <div style={{ position: 'relative' }}>
          {/* Score ring */}
          <div style={{ position: 'relative', width: 120, height: 120, margin: '0 auto 16px' }}>
            <svg viewBox="0 0 120 120" style={{ transform: 'rotate(-90deg)', width: '100%', height: '100%' }}>
              <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="10" />
              <circle cx="60" cy="60" r="52" fill="none" stroke="white" strokeWidth="10"
              strokeDasharray={`${2 * Math.PI * 52 * pct / 100} ${2 * Math.PI * 52 * (1 - pct / 100)}`}
              strokeLinecap="round" />
            </svg>
            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ fontSize: 30, fontWeight: 800, color: 'white', lineHeight: 1 }}>{score}</span>
              <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.7)', fontWeight: 500 }}>/{total}</span>
            </div>
          </div>
          <h2 style={{ color: 'white', fontSize: 22, fontWeight: 800, marginBottom: 6, display: 'inline-flex', alignItems: 'center', gap: 8 }}>
            {pct >= 80 ? <><Icon name="party" size={22} color="white" />素晴らしい！</> : pct >= 60 ? <><Icon name="thumbs-up" size={22} color="white" />よくできました</> : <><Icon name="flex" size={22} color="white" />もう少し！</>}
          </h2>
          <p style={{ color: 'rgba(255,255,255,0.75)', fontSize: 13 }}>正解率 {pct}%</p>

          {/* XP earned */}
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, marginTop: 14, background: 'rgba(255,255,255,0.15)', borderRadius: 99, padding: '8px 18px', backdropFilter: 'blur(8px)' }}>
                        <Icon name="bolt" size={16} color="#FCD34D" />
            <span style={{ color: 'white', fontWeight: 700, fontSize: 15 }}>+{xpEarned} XP 獲得！</span>
          </div>
        </div>
      </div>

      <div style={{ padding: '20px 16px 0' }}>
        {/* Level up card */}
        <div style={{
          background: cardBg, borderRadius: 18, padding: '16px',
          border: `1.5px solid ${theme.mid}`, marginBottom: 16,
          boxShadow: isDark ? 'none' : `0 2px 12px ${theme.mid}`
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: textPrimary }}>Lv.7 → Lv.8 まで</span>
            <span style={{ fontSize: 12, color: textSec }}>460 / 500 XP</span>
          </div>
          <XPBar xp={460} maxXp={500} theme={theme} />
          <p style={{ fontSize: 11, color: textSec, marginTop: 8 }}>あと 40 XP でレベルアップ！</p>
        </div>

        {/* Breakdown */}
        <div style={{
          background: cardBg, borderRadius: 18, padding: '16px',
          border: `1px solid ${borderCol}`, marginBottom: 16,
          boxShadow: isDark ? 'none' : '0 2px 8px rgba(0,0,0,0.04)'
        }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: textPrimary, marginBottom: 14 }}>問題別結果</div>
          {[...Array(10)].map((_, i) =>
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
              <span style={{ fontSize: 11, color: textSec, width: 16, fontWeight: 500 }}>{i + 1}</span>
              <div style={{ flex: 1, background: isDark ? '#334155' : '#F1F5F9', borderRadius: 99, height: 8, overflow: 'hidden' }}>
                <div style={{ width: '100%', height: '100%', background: i < 8 ? '#10B981' : '#EF4444', borderRadius: 99 }} />
              </div>
                            <span style={{ display: 'inline-flex', alignItems: 'center' }}>{i < 8 ? <Icon name="check-circle" size={14} color="#10B981" /> : <Icon name="x-circle" size={14} color="#EF4444" />}</span>
            </div>
          )}
        </div>

        {/* Badges earned */}
        <div style={{
          background: cardBg, borderRadius: 18, padding: '16px',
          border: `1px solid ${borderCol}`, marginBottom: 20,
          boxShadow: isDark ? 'none' : '0 2px 8px rgba(0,0,0,0.04)'
        }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: textPrimary, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 6 }}>獲得バッジ <Icon name="medal" size={16} color="#F59E0B" /></div>
          <div style={{ display: 'flex', gap: 12 }}>
            {[['flame', '5日連続', '#F59E0B'], ['target', '高正解率', '#10B981'], ['bolt', 'スピード', '#8B5CF6']].map(([ic, lb, col]) =>
            <div key={lb} style={{ flex: 1, textAlign: 'center', background: isDark ? '#334155' : theme.light, borderRadius: 14, padding: '12px 6px' }}>
                <div style={{ marginBottom: 6, display: 'flex', justifyContent: 'center' }}><Icon name={ic} size={24} color={col} /></div>
                <div style={{ fontSize: 10, color: textSec, fontWeight: 600 }}>{lb}</div>
              </div>
            )}
          </div>
        </div>

        {/* CTA buttons */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <button onClick={() => onNavigate('quiz')} style={{
            background: theme.primary, color: 'white', border: 'none',
            borderRadius: 14, padding: '15px', fontSize: 15, fontWeight: 700,
            fontFamily: 'Noto Sans JP', cursor: 'pointer',
            boxShadow: `0 4px 14px ${theme.primary}55`,
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8
          }}><Icon name="refresh" size={16} color="white" strokeWidth={2.4} />もう一度挑戦する</button>
          <button onClick={() => onNavigate('home')} style={{
            background: cardBg, color: theme.primary,
            border: `2px solid ${theme.mid}`,
            borderRadius: 14, padding: '14px', fontSize: 15, fontWeight: 700,
            fontFamily: 'Noto Sans JP', cursor: 'pointer',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8
          }}><Icon name="home" size={16} color={theme.primary} strokeWidth={2.4} />ホームへ戻る</button>
        </div>
      </div>
    </div>);

}

// ─── App shell ───────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState('topicJourney');
  const [activeUnit, setActiveUnit] = React.useState('cardio');
  const [theme, setThemeName] = React.useState(g_theme);
  const [variant, setVariantName] = React.useState(g_variant);
  const [qtype, setQtypeName] = React.useState(g_qtype);

  g_setters.theme = setThemeName;
  g_setters.variant = setVariantName;
  g_setters.qtype = setQtypeName;

  React.useEffect(() => {
    const saved = localStorage.getItem('medquiz_screen');
    if (saved) setScreen(saved);
    const savedUnit = localStorage.getItem('medquiz_unit');
    if (savedUnit) setActiveUnit(savedUnit);
  }, []);

  const navigate = (s) => {
    setScreen(s);
    localStorage.setItem('medquiz_screen', s);
  };
  const openUnit = (uid) => {
    setActiveUnit(uid);
    localStorage.setItem('medquiz_unit', uid);
    navigate('topicJourney');
  };

  const tok = THEMES[theme] || THEMES.blue;
  const isDark = variant === 'C';

  const screenContent = screen === 'home' ?
  <HomeScreen theme={tok} variant={variant} onNavigate={navigate} /> :
  screen === 'courses' ?
  <CoursesScreen theme={tok} variant={variant} onNavigate={navigate} /> :
  screen === 'anatomyUnits' ?
  <AnatomyUnitsScreen theme={tok} variant={variant} onNavigate={navigate} openUnit={openUnit} /> :
  screen === 'topicJourney' ?
  <TopicJourneyScreen theme={tok} variant={variant} unitId={activeUnit} onNavigate={navigate} goBack={() => navigate('anatomyUnits')} /> :
  screen === 'review' ?
  <ReviewScreen theme={tok} variant={variant} onNavigate={navigate} /> :
  screen === 'profile' ?
  <ProfileScreen theme={tok} variant={variant} onNavigate={navigate} /> :
  screen === 'quiz' ?
  <QuizScreen theme={tok} variant={variant} qtype={qtype} onNavigate={navigate} /> :
  <ResultScreen theme={tok} variant={variant} onNavigate={navigate} />;

  return (
    <div style={{ display: 'flex', gap: 32, alignItems: 'flex-start', flexWrap: 'wrap', justifyContent: 'center' }}>
      {/* Label */}
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
        <IOSDevice width={390} height={844} dark={isDark}>
          {screenContent}
          {screen !== 'quiz' && screen !== 'anatomyUnits' && screen !== 'topicJourney' && <TabBar current={screen} onNavigate={navigate} isDark={isDark} theme={tok} />}
        </IOSDevice>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#374151', marginBottom: 4 }}>
            {screen === 'home' ? 'ホーム / ダッシュボード' : screen === 'courses' ? 'コース・科目一覧' : screen === 'anatomyUnits' ? '解剖学 ・ ユニット一覧' : screen === 'topicJourney' ? 'レッスンパス（トピック別）' : screen === 'review' ? '復習 / 間隔反復' : screen === 'profile' ? 'マイページ' : screen === 'quiz' ? 'クイズプレイ' : '結果・スコア'}
          </div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
            {['home', 'courses', 'anatomyUnits', 'topicJourney', 'review', 'profile', 'quiz', 'result'].map((s) =>
            <button key={s} onClick={() => navigate(s)} style={{
              padding: '4px 12px', borderRadius: 20,
              border: '1.5px solid ' + (screen === s ? tok.primary : '#D1D5DB'),
              background: screen === s ? tok.light : 'white',
              color: screen === s ? tok.primary : '#6B7280',
              fontSize: 11, fontWeight: 600, cursor: 'pointer',
              fontFamily: 'Noto Sans JP'
            }}>
                {s === 'home' ? 'ホーム' : s === 'courses' ? 'コース' : s === 'anatomyUnits' ? '解剖学ユニット' : s === 'topicJourney' ? 'レッスンパス' : s === 'review' ? '復習' : s === 'profile' ? 'マイページ' : s === 'quiz' ? 'クイズ' : '結果'}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// ─── Tweaks bridge ───────────────────────────────────────────
window.addEventListener('message', (e) => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>
</body>
</html>
